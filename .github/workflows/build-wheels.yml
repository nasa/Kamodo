name: Build Wheels

on:
  # Build on version tags
  push:
    tags:
      - 'v*'
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      publish_to_pypi:
        description: 'Publish to PyPI after build'
        required: false
        default: false
        type: boolean

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13, macos-14, windows-latest]
        # macos-13 is Intel, macos-14 is ARM

    steps:
      - uses: actions/checkout@v4

      # Install gfortran for Fortran compilation
      - name: Install gfortran (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran

      - name: Install gfortran (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gcc

      - name: Install gfortran (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc-fortran

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.21.3

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          # Build one abi3 wheel per platform (cp310-abi3-*).
          # py-limited-api in setup.py makes bdist_wheel emit abi3 tags.
          CIBW_BUILD: "cp310-*"
          # Skip 32-bit builds and musllinux
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_*"
          # Install gfortran in manylinux container
          CIBW_BEFORE_ALL_LINUX: yum install -y gcc-gfortran || apt-get update && apt-get install -y gfortran
          # Set environment for Windows gfortran
          CIBW_ENVIRONMENT_WINDOWS: >
            PATH="C:\\msys64\\mingw64\\bin;$PATH"
          # Test the wheel on multiple Python versions to verify portability
          CIBW_TEST_COMMAND: >
            python -c "import kamodo_ccmc; print(f'kamodo_ccmc {kamodo_ccmc.__version__} OK')"
          # Use release mode for strict error handling
          CIBW_ENVIRONMENT: "KAMODO_RELEASE=1"

      - name: Verify wheel ABI tags
        shell: bash
        run: |
          echo "=== Verifying wheel ABI tags ==="
          for whl in wheelhouse/*.whl; do
            echo "Wheel: $(basename $whl)"
            # Extract the compatibility tag from the filename
            tag=$(basename "$whl" | sed 's/.*-\(cp[0-9]*-[^-]*\)-.*/\1/')
            echo "  Tag: $tag"
            if echo "$tag" | grep -q "abi3"; then
              echo "  OK: abi3 wheel"
            else
              echo "  ERROR: Expected abi3 tag, got: $tag"
              echo "  This means py-limited-api config is not taking effect."
              echo "  Falling back to CP-specific builds may be needed."
              exit 1
            fi
          done

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Only publish on tag push or manual trigger with publish flag
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_pypi == 'true')

    # Use GitHub's OIDC for trusted publishing to PyPI
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # For testing, use TestPyPI first:
          # repository-url: https://test.pypi.org/legacy/
          skip-existing: true
